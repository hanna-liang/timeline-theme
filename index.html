<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Timeline</title>

  <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
  <link rel="stylesheet" href="timeline-theme.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .timeline-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .timeline-legend button {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      color: white;
    }

    .timeline-legend button[data-filter="all"] {
      background: #4b5563;
    }

    .timeline-legend button[data-filter="hyperfertility"] {
      background: #7c3aed;
    }

    .timeline-legend button[data-filter="pain"] {
      background: #dc2626;
    }

    .timeline-legend button[data-filter="inferiority"] {
      background: #2563eb;
    }

    .timeline-legend button[data-filter="utility"] {
      background: #16a34a;
    }

    #timeline-embed {
      width: 100%;
      height: 650px;
    }

    .event-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
      vertical-align: middle;
      color: white;
      line-height: 1.6;
    }

    .event-pill.tag-hyperfertility {
      background: #7c3aed;
    }

    .event-pill.tag-pain {
      background: #dc2626;
    }

    .event-pill.tag-inferiority {
      background: #2563eb;
    }

    .event-pill.tag-utility {
      background: #16a34a;
    }

    .tl-timemarker.tag-hyperfertility .tl-timemarker-content-container {
      background: #7c3aed !important;
      color: white !important;
    }

    .tl-timemarker.tag-pain .tl-timemarker-content-container {
      background: #dc2626 !important;
      color: white !important;
    }

    .tl-timemarker.tag-inferiority .tl-timemarker-content-container {
      background: #2563eb !important;
      color: white !important;
    }

    .tl-timemarker.tag-utility .tl-timemarker-content-container {
      background: #16a34a !important;
      color: white !important;
    }

    .tl-timemarker.is-dimmed {
      opacity: 0.22;
      transition: opacity 0.2s ease;
    }
  </style>
</head>
<body>

  <div class="timeline-legend">
    <button data-filter="all">All</button>
    <button data-filter="hyperfertility">Hyperfertility & sexual deviance</button>
    <button data-filter="pain">Pain insensitivity</button>
    <button data-filter="inferiority">Biological differences & inferiority</button>
    <button data-filter="utility">Biological utility</button>
  </div>

  <div id="timeline-embed"></div>

  <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>
  <script>
    const source = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSrFsEAi3oN7zJZMshHsqHT7jAk0Nt4iM_uL03vN5KmABk79tknJ-NXnBS1V6WulB_lJwg4b2qmi_FC/pubhtml";

    const timeline = new TL.Timeline("timeline-embed", source, {
      initial_zoom: 2
    });

    function getTagFromText(text) {
      const t = (text || "").toLowerCase();

      if (t.includes("hyperfertility")) return "hyperfertility";
      if (t.includes("sexual deviance")) return "hyperfertility";
      if (t.includes("pain insensitivity")) return "pain";
      if (t.includes("pain")) return "pain";
      if (t.includes("biological differences")) return "inferiority";
      if (t.includes("inferiority")) return "inferiority";
      if (t.includes("biological utility")) return "utility";
      if (t.includes("utility")) return "utility";

      return null;
    }

    function getLabelFromTag(tag) {
      if (tag === "hyperfertility") return "Hyperfertility & sexual deviance";
      if (tag === "pain") return "Pain insensitivity";
      if (tag === "inferiority") return "Biological differences & inferiority";
      if (tag === "utility") return "Biological utility";
      return null;
    }

    function tagMarkers() {
      const markers = document.querySelectorAll(".tl-timemarker");

      markers.forEach(marker => {
        marker.classList.remove(
          "tag-hyperfertility",
          "tag-pain",
          "tag-inferiority",
          "tag-utility"
        );

        const text = marker.textContent || "";
        const tag = getTagFromText(text);

        if (tag) {
          marker.classList.add(`tag-${tag}`);
        }
      });
    }

    function addSlidePill() {
      const activeSlide = document.querySelector(".tl-slide.tl-slide-active");
      if (!activeSlide) return;

      const headline = activeSlide.querySelector(".tl-headline");
      if (!headline) return;

      const existingPill = headline.querySelector(".event-pill");
      if (existingPill) {
        existingPill.remove();
      }

      const text = headline.textContent || "";
      const tag = getTagFromText(text);
      const label = getLabelFromTag(tag);

      if (!tag || !label) return;

      const pill = document.createElement("span");
      pill.className = `event-pill tag-${tag}`;
      pill.textContent = label;
      headline.prepend(pill);
    }

    function enhanceTimeline() {
      tagMarkers();
      addSlidePill();
    }

    function applyFilter(tag) {
      document.querySelectorAll(".tl-timemarker").forEach(marker => {
        marker.classList.remove("is-dimmed");

        if (tag !== "all" && !marker.classList.contains(`tag-${tag}`)) {
          marker.classList.add("is-dimmed");
        }
      });
    }

    timeline.on("loaded", () => {
      enhanceTimeline();
    });

    timeline.on("change", () => {
      setTimeout(enhanceTimeline, 100);
    });

    const observer = new MutationObserver(() => {
      enhanceTimeline();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });

    document.querySelectorAll(".timeline-legend button").forEach(button => {
      button.addEventListener("click", () => {
        const tag = button.dataset.filter;
        applyFilter(tag);
      });
    });
  </script>
</body>
</html>
