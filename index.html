<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Timeline</title>

  <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
  <link rel="stylesheet" href="timeline-theme.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .timeline-filter-bar {
      position: sticky;
      top: 0;
      z-index: 9999;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 14px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #e5e5e5;
    }

    .timeline-filter-label {
      font-size: 14px;
      font-weight: 600;
      color: #222222;
      margin-right: 4px;
    }

    .timeline-filter-btn {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      opacity: 0.55;
      transition: opacity 0.15s;
    }

    .timeline-filter-btn[data-filter="all"]            { background: #444444; }
    .timeline-filter-btn[data-filter="hyperfertility"] { background: #7c3aed; }
    .timeline-filter-btn[data-filter="pain"]           { background: #dc2626; }
    .timeline-filter-btn[data-filter="inferiority"]    { background: #2563eb; }
    .timeline-filter-btn[data-filter="utility"]        { background: #16a34a; }

    .timeline-filter-btn.is-active {
      opacity: 1;
      outline: 2px solid #111111;
      outline-offset: 2px;
    }

    #timeline-embed {
      width: 100%;
      height: 650px;
    }

    #timeline-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 650px;
      font-size: 15px;
      color: #888;
    }

    .event-pill {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
      line-height: 1.4;
      color: #ffffff !important;
      vertical-align: middle;
      white-space: nowrap;
    }

    .event-pill.tag-hyperfertility { background: #7c3aed; }
    .event-pill.tag-pain           { background: #dc2626; }
    .event-pill.tag-inferiority    { background: #2563eb; }
    .event-pill.tag-utility        { background: #16a34a; }
  </style>
</head>
<body>

  <div class="timeline-filter-bar">
    <span class="timeline-filter-label">Filter by tag:</span>
    <button class="timeline-filter-btn is-active" data-filter="all">All</button>
    <button class="timeline-filter-btn" data-filter="hyperfertility">Hyperfertility &amp; sexual deviance</button>
    <button class="timeline-filter-btn" data-filter="pain">Pain insensitivity</button>
    <button class="timeline-filter-btn" data-filter="inferiority">Biological differences &amp; inferiority</button>
    <button class="timeline-filter-btn" data-filter="utility">Biological utility</button>
  </div>

  <div id="timeline-loading">Loading timeline…</div>
  <div id="timeline-embed" style="display:none;"></div>

  <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>
  <script>

    // ─── Tag config ───────────────────────────────────────────────────────────
    // "groupValue" must match exactly what you type in the Group column of your sheet.

    const TAG_CONFIG = {
      hyperfertility: {
        label:      "Hyperfertility & sexual deviance",
        groupValue: "Hyperfertility & sexual deviance",
        color:      "#7c3aed"
      },
      pain: {
        label:      "Pain insensitivity",
        groupValue: "Pain insensitivity",
        color:      "#dc2626"
      },
      inferiority: {
        label:      "Biological differences & inferiority",
        groupValue: "Biological differences & inferiority",
        color:      "#2563eb"
      },
      utility: {
        label:      "Biological utility",
        groupValue: "Biological utility",
        color:      "#16a34a"
      }
    };

    const SHEET_CSV_URL =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vSrFsEAi3oN7zJZMshHsqHT7jAk0Nt4iM_uL03vN5KmABk79tknJ-NXnBS1V6WulB_lJwg4b2qmi_FC/pub?output=csv";

    // ─── State ────────────────────────────────────────────────────────────────

    let allRows   = [];   // parsed CSV rows (objects), title row first
    let timeline  = null;
    let currentFilter = "all";

    // ─── CSV parser ───────────────────────────────────────────────────────────
    // Handles quoted fields and embedded commas/newlines.

    function parseCSV(text) {
      const rows = [];
      let row = [], field = "", inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];

        if (inQuotes) {
          if (ch === '"' && next === '"') { field += '"'; i++; }
          else if (ch === '"')           { inQuotes = false; }
          else                           { field += ch; }
        } else {
          if      (ch === '"')  { inQuotes = true; }
          else if (ch === ',')  { row.push(field.trim()); field = ""; }
          else if (ch === '\n') { row.push(field.trim()); rows.push(row); row = []; field = ""; }
          else if (ch === '\r') { /* skip */ }
          else                  { field += ch; }
        }
      }
      if (field || row.length) { row.push(field.trim()); rows.push(row); }

      const headers = rows[0].map(h => h.toLowerCase().trim());
      return rows.slice(1).map(r => {
        const obj = {};
        headers.forEach((h, i) => { obj[h] = r[i] || ""; });
        return obj;
      });
    }

    // ─── Row → KnightLab event object ─────────────────────────────────────────

    function rowToEvent(row) {
      // date fields
      const startDate = {
        year:  row["year"]  || undefined,
        month: row["month"] || undefined,
        day:   row["day"]   || undefined,
        hour:  row["time"]  ? row["time"].split(":")[0] : undefined,
        minute:row["time"]  ? row["time"].split(":")[1] : undefined
      };

      const endDate = row["end year"] ? {
        year:  row["end year"]   || undefined,
        month: row["end month"]  || undefined,
        day:   row["end day"]    || undefined
      } : undefined;

      const event = {
        start_date:   startDate,
        text: {
          headline: row["headline"] || "",
          text:     row["text"]     || ""
        }
      };

      if (endDate)              event.end_date     = endDate;
      if (row["display date"])  event.display_date = row["display date"];
      if (row["group"])         event.group        = row["group"];
      if (row["background"])    event.background   = { color: row["background"] };

      if (row["media"]) {
        event.media = {
          url:     row["media"],
          credit:  row["media credit"]  || "",
          caption: row["media caption"] || ""
        };
        if (row["media thumbnail"]) event.media.thumbnail = row["media thumbnail"];
      }

      return event;
    }

    // ─── Build TL.Timeline JSON from rows ────────────────────────────────────

    function buildTimelineJSON(rows) {
      // The "title" row (Type = title) becomes the title slide
      const titleRow  = rows.find(r => (r["type"] || "").toLowerCase() === "title");
      const eventRows = rows.filter(r => (r["type"] || "").toLowerCase() !== "title");

      const json = { events: eventRows.map(rowToEvent) };
      if (titleRow) json.title = rowToEvent(titleRow);
      return json;
    }

    // ─── Filter rows and re-render ────────────────────────────────────────────

    function renderTimeline(filter) {
      currentFilter = filter;

      // Update button states
      document.querySelectorAll(".timeline-filter-btn").forEach(btn => {
        btn.classList.toggle("is-active", btn.dataset.filter === filter);
      });

      // Choose which event rows to include
      const eventRows = allRows.filter(r => {
        if ((r["type"] || "").toLowerCase() === "title") return false;
        if (filter === "all") return true;
        const cfg = TAG_CONFIG[filter];
        return cfg && (r["group"] || "").toLowerCase() === cfg.groupValue.toLowerCase();
      });

      // Always keep the title row
      const titleRow = allRows.find(r => (r["type"] || "").toLowerCase() === "title");

      const rowsForRender = titleRow
        ? [titleRow, ...eventRows]
        : eventRows;

      const json = buildTimelineJSON(rowsForRender);

      // Destroy old instance and clear container
      if (timeline) {
        try { timeline.destroy(); } catch(e) {}
        timeline = null;
      }

      const embed = document.getElementById("timeline-em
