<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Timeline</title>

  <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
  <link rel="stylesheet" href="timeline-theme.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .timeline-filter-bar {
      position: sticky;
      top: 0;
      z-index: 9999;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 14px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #e5e5e5;
    }

    .timeline-filter-label {
      font-size: 14px;
      font-weight: 600;
      color: #222222;
      margin-right: 4px;
    }

    .timeline-filter-btn {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      opacity: 0.55;
      transition: opacity 0.15s;
    }

    .timeline-filter-btn[data-filter="all"]            { background: #444444; }
    .timeline-filter-btn[data-filter="hyperfertility"] { background: #7c3aed; }
    .timeline-filter-btn[data-filter="pain"]           { background: #dc2626; }
    .timeline-filter-btn[data-filter="inferiority"]    { background: #2563eb; }
    .timeline-filter-btn[data-filter="utility"]        { background: #16a34a; }

    .timeline-filter-btn.is-active {
      opacity: 1;
      outline: 2px solid #111111;
      outline-offset: 2px;
    }

    #timeline-embed {
      width: 100%;
      height: 650px;
    }

    #timeline-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 650px;
      font-size: 15px;
      color: #888;
    }

    .event-pill {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
      line-height: 1.4;
      color: #ffffff !important;
      vertical-align: middle;
      white-space: nowrap;
    }

    .event-pill.tag-hyperfertility { background: #7c3aed; }
    .event-pill.tag-pain           { background: #dc2626; }
    .event-pill.tag-inferiority    { background: #2563eb; }
    .event-pill.tag-utility        { background: #16a34a; }
  </style>
</head>
<body>

  <div class="timeline-filter-bar">
    <span class="timeline-filter-label">Filter by tag:</span>
    <button class="timeline-filter-btn is-active" data-filter="all">All</button>
    <button class="timeline-filter-btn" data-filter="hyperfertility">Hyperfertility &amp; sexual deviance</button>
    <button class="timeline-filter-btn" data-filter="pain">Pain insensitivity</button>
    <button class="timeline-filter-btn" data-filter="inferiority">Biological differences &amp; inferiority</button>
    <button class="timeline-filter-btn" data-filter="utility">Biological utility</button>
  </div>

  <div id="timeline-loading">Loading timeline…</div>
  <div id="timeline-embed" style="display:none;"></div>

  <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>
