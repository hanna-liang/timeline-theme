<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Timeline</title>

  <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
  <link rel="stylesheet" href="timeline-theme.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .timeline-filter-bar {
      position: sticky;
      top: 0;
      z-index: 9999;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 14px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #e5e5e5;
    }

    .timeline-filter-label {
      font-size: 14px;
      font-weight: 600;
      color: #222222;
      margin-right: 4px;
    }

    .timeline-filter-btn {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      opacity: 0.55;
      transition: opacity 0.15s;
    }

    .timeline-filter-btn[data-filter="all"]           { background: #444444; }
    .timeline-filter-btn[data-filter="hyperfertility"] { background: #7c3aed; }
    .timeline-filter-btn[data-filter="pain"]           { background: #dc2626; }
    .timeline-filter-btn[data-filter="inferiority"]    { background: #2563eb; }
    .timeline-filter-btn[data-filter="utility"]        { background: #16a34a; }

    .timeline-filter-btn.is-active {
      opacity: 1;
      outline: 2px solid #111111;
      outline-offset: 2px;
    }

    #timeline-embed {
      width: 100%;
      height: 650px;
    }

    .event-pill {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
      line-height: 1.4;
      color: #ffffff !important;
      vertical-align: middle;
      white-space: nowrap;
    }

    .event-pill.tag-hyperfertility { background: #7c3aed; }
    .event-pill.tag-pain           { background: #dc2626; }
    .event-pill.tag-inferiority    { background: #2563eb; }
    .event-pill.tag-utility        { background: #16a34a; }

    /*
     * Filtered-out MARKERS: collapse visually but keep space so layout
     * doesn't jump. KnightLab positions markers absolutely, so this is safe.
     */
    .tl-timemarker.is-filtered-out {
      opacity: 0 !important;
      pointer-events: none !important;
      cursor: default !important;
    }

    /*
     * Filtered-out SLIDES: dim with an overlay instead of display:none
     * so KnightLab's internal slide index never breaks.
     */
    .tl-slide.is-filtered-out {
      position: relative;
    }
    .tl-slide.is-filtered-out::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.82);
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div class="timeline-filter-bar">
    <span class="timeline-filter-label">Filter by tag:</span>
    <button class="timeline-filter-btn is-active" data-filter="all">All</button>
    <button class="timeline-filter-btn" data-filter="hyperfertility">Hyperfertility &amp; sexual deviance</button>
    <button class="timeline-filter-btn" data-filter="pain">Pain insensitivity</button>
    <button class="timeline-filter-btn" data-filter="inferiority">Biological differences &amp; inferiority</button>
    <button class="timeline-filter-btn" data-filter="utility">Biological utility</button>
  </div>

  <div id="timeline-embed"></div>

  <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>
  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSrFsEAi3oN7zJZMshHsqHT7jAk0Nt4iM_uL03vN5KmABk79tknJ-NXnBS1V6WulB_lJwg4b2qmi_FC/pubhtml";

    const timeline = new TL.Timeline("timeline-embed", SHEET_URL, {
      initial_zoom: 2
    });

    // ─── Tag config ──────────────────────────────────────────────────────────

    const TAG_CONFIG = {
      hyperfertility: {
        label: "Hyperfertility & sexual deviance",
        color: "#7c3aed",
        // strings to look for in the Group column (case-insensitive)
        keywords: ["hyperfertility", "sexual deviance"]
      },
      pain: {
        label: "Pain insensitivity",
        color: "#dc2626",
        keywords: ["pain insensitivity"]
      },
      inferiority: {
        label: "Biological differences & inferiority",
        color: "#2563eb",
        keywords: ["biological differences", "inferiority"]
      },
      utility: {
        label: "Biological utility",
        color: "#16a34a",
        keywords: ["biological utility"]
      }
    };

    // ─── State ───────────────────────────────────────────────────────────────

    let currentFilter = "all";

    /*
     * eventTags[i] = array of tag keys for the i-th event
     * (index 0 = first real event after the title slide)
     * Built once from KnightLab's internal data after `loaded`.
     */
    let eventTags = [];

    // ─── Helpers ─────────────────────────────────────────────────────────────

    function tagsFromText(text) {
      const t = (text || "").toLowerCase();
      return Object.entries(TAG_CONFIG)
        .filter(([, cfg]) => cfg.keywords.some(kw => t.includes(kw)))
        .map(([key]) => key);
    }

    /*
     * Read tags straight from KnightLab's parsed data object.
     * The "Group" column ends up in event.group (TL3 internal field).
     * Fall back to headline + text if group is empty.
     */
    function buildEventTagsFromData() {
      eventTags = [];
      try {
        const events = timeline._data && timeline._data.events;
        if (!events) return;

        events.forEach(ev => {
          const groupText  = (ev.group        || "");
          const titleText  = (ev.text && ev.text.headline ? ev.text.headline : "");
          const bodyText   = (ev.text && ev.text.text     ? ev.text.text     : "");
          const combined   = [groupText, titleText, bodyText].join(" ");
          eventTags.push(tagsFromText(combined));
        });
      } catch(e) {
        console.warn("Could not read timeline._data.events:", e);
      }
    }

    // ─── DOM enhancement ─────────────────────────────────────────────────────

    /*
     * Tag-classify slide DOM nodes.
     * Slides are in order: [title-slide, event0, event1, ...]
     * eventTags[i] corresponds to slides[i+1].
     */
    function classifySlides() {
      const slides = document.querySelectorAll(".tl-slide");
      const tagKeys = Object.keys(TAG_CONFIG);

      slides.forEach((slide, idx) => {
        // remove old tag classes
        tagKeys.forEach(k => slide.classList.remove(`tag-${k}`));
        slide.classList.remove("alt-dark", "alt-light");

        if (slide.classList.contains("tl-title-slide")) return;

        const eventIdx = idx - 1; // offset past title slide
        const tags = eventTags[eventIdx] || tagsFromText(slide.textContent);
        tags.forEach(tag => slide.classList.add(`tag-${tag}`));
      });

      // Alternating dark/light on non-title slides
      const regularSlides = Array.from(slides).filter(s => !s.classList.contains("tl-title-slide"));
      regularSlides.forEach((slide, i) => {
        slide.classList.add(i % 2 === 0 ? "alt-dark" : "alt-light");
      });
    }

    /*
     * Tag-classify marker DOM nodes.
     * Markers appear in DOM order matching events (no title-slide offset).
     */
    function classifyMarkers() {
      const markers = document.querySelectorAll(".tl-timemarker");
      const tagKeys  = Object.keys(TAG_CONFIG);

      markers.forEach((marker, idx) => {
        tagKeys.forEach(k => marker.classList.remove(`tag-${k}`));

        const tags = eventTags[idx] || tagsFromText(marker.textContent);
        tags.forEach(tag => marker.classList.add(`tag-${tag}`));
      });
    }

    function addSlidePills() {
      const slides = document.querySelectorAll(".tl-slide");

      slides.forEach((slide, idx) => {
        if (slide.classList.contains("tl-title-slide")) return;

        const headline = slide.querySelector(".tl-headline");
        if (!headline) return;

        // clear old pills
        headline.querySelectorAll(".event-pill").forEach(p => p.remove());

        const eventIdx = idx - 1;
        const tags = eventTags[eventIdx] || tagsFromText(slide.textContent);

        tags.forEach(tag => {
          const cfg = TAG_CONFIG[tag];
          if (!cfg) return;
          const pill = document.createElement("span");
          pill.className = `event-pill tag-${tag}`;
          pill.textContent = cfg.label;
          headline.appendChild(pill);
        });
      });
    }

    // ─── Filtering ───────────────────────────────────────────────────────────

    function applyFilter(tag) {
      currentFilter = tag;

      // Update button states
      document.querySelectorAll(".timeline-filter-btn").forEach(btn => {
        btn.classList.toggle("is-active", btn.dataset.filter === tag);
      });

      // Filter slides
      document.querySelectorAll(".tl-slide").forEach((slide, idx) => {
        slide.classList.remove("is-filtered-out");

        if (slide.classList.contains("tl-title-slide")) {
          if (tag !== "all") slide.classList.add("is-filtered-out");
          return;
        }

        if (tag !== "all" && !slide.classList.contains(`tag-${tag}`)) {
          slide.classList.add("is-filtered-out");
        }
      });

      // Filter markers
      document.querySelectorAll(".tl-timemarker").forEach((marker, idx) => {
        marker.classList.remove("is-filtered-out");

        if (tag !== "all" && !marker.classList.contains(`tag-${tag}`)) {
          marker.classList.add("is-filtered-out");
        }
      });
    }

    // ─── Orchestration ───────────────────────────────────────────────────────

    function enhanceTimeline() {
      classifySlides();
      classifyMarkers();
      addSlidePills();
      applyFilter(currentFilter);
    }

    timeline.on("loaded", () => {
      // Build tag index from internal data first (most reliable)
      buildEventTagsFromData();
      // Then enhance DOM (give KnightLab a moment to finish painting)
      setTimeout(enhanceTimeline, 300);
    });

    timeline.on("change", () => {
      // Re-apply on navigation (pills may be added to newly-visible slides)
      setTimeout(enhanceTimeline, 500);
    });

    // ─── Button listeners ────────────────────────────────────────────────────

    document.querySelectorAll(".timeline-filter-btn").forEach(btn => {
      btn.addEventListener("click", () => applyFilter(btn.dataset.filter));
    });
  </script>
</body>
</html>
