<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>My Timeline</title>

  <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
  <link rel="stylesheet" href="timeline-theme.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
    }

    #timeline-embed {
      width: 100%;
      height: 650px;
    }

    /* category colors for markers */
    .tl-timemarker.tag-policy .tl-timemarker-content-container {
      background: #b91c1c !important;
      color: white !important;
    }

    .tl-timemarker.tag-medical-myth .tl-timemarker-content-container {
      background: #2563eb !important;
      color: white !important;
    }

    .tl-timemarker.tag-activism .tl-timemarker-content-container {
      background: #059669 !important;
      color: white !important;
    }

    .tl-timemarker.tag-sterilization .tl-timemarker-content-container {
      background: #d97706 !important;
      color: white !important;
    }

    /* optional: color active marker too */
    .tl-timemarker.tag-policy.tl-timemarker-active .tl-timemarker-content-container,
    .tl-timemarker.tag-medical-myth.tl-timemarker-active .tl-timemarker-content-container,
    .tl-timemarker.tag-activism.tl-timemarker-active .tl-timemarker-content-container,
    .tl-timemarker.tag-sterilization.tl-timemarker-active .tl-timemarker-content-container {
      filter: brightness(0.9);
    }

    /* optional: tag pill on slide headlines */
    .event-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
      vertical-align: middle;
      color: white;
    }

    .event-pill.tag-policy { background: #b91c1c; }
    .event-pill.tag-medical-myth { background: #2563eb; }
    .event-pill.tag-activism { background: #059669; }
    .event-pill.tag-sterilization { background: #d97706; }

    /* optional dimming for filtering */
    .tl-timemarker.is-dimmed {
      opacity: 0.25;
    }

    .timeline-legend {
      padding: 12px 16px;
      font-family: sans-serif;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .timeline-legend button {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="timeline-legend">
    <button data-filter="all">Show all</button>
    <button data-filter="policy">Policy</button>
    <button data-filter="medical-myth">Medical Myth</button>
    <button data-filter="activism">Activism</button>
    <button data-filter="sterilization">Sterilization</button>
  </div>

  <div id="timeline-embed"></div>

  <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>
  <script>
    const source =
      "https://docs.google.com/spreadsheets/d/e/2PACX-1vSrFsEAi3oN7zJZMshHsqHT7jAk0Nt4iM_uL03vN5KmABk79tknJ-NXnBS1V6WulB_lJwg4b2qmi_FC/pubhtml";

    const timeline = new TL.Timeline("timeline-embed", source, {
      initial_zoom: 2
    });

    function slugify(text) {
      return (text || "")
        .toString()
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/[^\w-]+/g, "")
        .replace(/--+/g, "-");
    }

    function inferTagFromMarker(markerEl) {
      const label = markerEl.querySelector(".tl-headline, .tl-timemarker-content")
        ?.textContent?.toLowerCase() || "";

      if (label.includes("policy")) return "policy";
      if (label.includes("medical myth")) return "medical-myth";
      if (label.includes("activism")) return "activism";
      if (label.includes("sterilization")) return "sterilization";
      return null;
    }

    function tagMarkers() {
      const markers = document.querySelectorAll(".tl-timemarker");
      markers.forEach(marker => {
        marker.classList.remove(
          "tag-policy",
          "tag-medical-myth",
          "tag-activism",
          "tag-sterilization"
        );

        const tag = inferTagFromMarker(marker);
        if (tag) marker.classList.add(`tag-${tag}`);
      });
    }

    function addSlidePill() {
      const activeSlide = document.querySelector(".tl-slide.tl-slide-active");
      if (!activeSlide) return;

      const headline = activeSlide.querySelector(".tl-headline");
      if (!headline) return;
      if (headline.querySelector(".event-pill")) return;

      const text = headline.textContent.toLowerCase();
      let tag = null;
      let label = null;

      if (text.includes("policy")) {
        tag = "policy";
        label = "Policy";
      } else if (text.includes("medical myth")) {
        tag = "medical-myth";
        label = "Medical Myth";
      } else if (text.includes("activism")) {
        tag = "activism";
        label = "Activism";
      } else if (text.includes("sterilization")) {
        tag = "sterilization";
        label = "Sterilization";
      }

      if (!tag) return;

      const pill = document.createElement("span");
      pill.className = `event-pill tag-${tag}`;
      pill.textContent = label;
      headline.prepend(pill);
    }

    function applyFilter(tag) {
      document.querySelectorAll(".tl-timemarker").forEach(marker => {
        marker.classList.remove("is-dimmed");
        if (tag !== "all" && !marker.classList.contains(`tag-${tag}`)) {
          marker.classList.add("is-dimmed");
        }
      });
    }

    function enhanceTimeline() {
      tagMarkers();
      addSlidePill();
    }

    timeline.on("loaded", enhanceTimeline);
    timeline.on("change", enhanceTimeline);

    const observer = new MutationObserver(() => {
      enhanceTimeline();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });

    document.querySelectorAll(".timeline-legend button").forEach(button => {
      button.addEventListener("click", () => {
        applyFilter(button.dataset.filter);
      });
    });
  </script>
</body>
</html>
