<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Timeline</title>

  <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">
  <link rel="stylesheet" href="timeline-theme.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .timeline-filter-bar {
      position: sticky;
      top: 0;
      z-index: 9999;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      padding: 14px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #e5e5e5;
    }

    .timeline-filter-label {
      font-size: 14px;
      font-weight: 600;
      color: #222222;
      margin-right: 4px;
    }

    .timeline-filter-btn {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: white;
    }

    .timeline-filter-btn[data-filter="all"] {
      background: #444444;
    }

    .timeline-filter-btn[data-filter="hyperfertility"] {
      background: #7c3aed;
    }

    .timeline-filter-btn[data-filter="pain"] {
      background: #dc2626;
    }

    .timeline-filter-btn[data-filter="inferiority"] {
      background: #2563eb;
    }

    .timeline-filter-btn[data-filter="utility"] {
      background: #16a34a;
    }

    .timeline-filter-btn.is-active {
      outline: 2px solid #111111;
      outline-offset: 2px;
    }

    #timeline-embed {
      width: 100%;
      height: 650px;
    }

    .event-pill {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-right: 8px;
      line-height: 1.4;
      color: #ffffff !important;
      vertical-align: middle;
    }

    .event-pill.tag-hyperfertility { background: #7c3aed; }
    .event-pill.tag-pain { background: #dc2626; }
    .event-pill.tag-inferiority { background: #2563eb; }
    .event-pill.tag-utility { background: #16a34a; }

    /* dim instead of removing */
    .tl-timemarker.is-hidden-by-filter {
      opacity: 0.15 !important;
    }

    .tl-slide.is-hidden-by-filter {
      opacity: 0.2 !important;
    }
  </style>
</head>
<body>

  <div class="timeline-filter-bar">
    <span class="timeline-filter-label">Filter by tag:</span>
    <button class="timeline-filter-btn is-active" data-filter="all">All</button>
    <button class="timeline-filter-btn" data-filter="hyperfertility">Hyperfertility & sexual deviance</button>
    <button class="timeline-filter-btn" data-filter="pain">Pain insensitivity</button>
    <button class="timeline-filter-btn" data-filter="inferiority">Biological differences & inferiority</button>
    <button class="timeline-filter-btn" data-filter="utility">Biological utility</button>
  </div>

  <div id="timeline-embed"></div>

  <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>
  <script>
    const source = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSrFsEAi3oN7zJZMshHsqHT7jAk0Nt4iM_uL03vN5KmABk79tknJ-NXnBS1V6WulB_lJwg4b2qmi_FC/pubhtml";

    const timeline = new TL.Timeline("timeline-embed", source, {
      initial_zoom: 2
    });

    let currentFilter = "all";

    function normalizeText(text) {
      return (text || "").toLowerCase().trim();
    }

    function getTagsFromText(text) {
      const t = normalizeText(text);
      const tags = [];

      if (t.includes("hyperfertility") || t.includes("sexual deviance")) {
        tags.push("hyperfertility");
      }

      if (t.includes("pain insensitivity")) {
        tags.push("pain");
      }

      if (t.includes("biological differences") || t.includes("inferiority")) {
        tags.push("inferiority");
      }

      if (t.includes("biological utility")) {
        tags.push("utility");
      }

      return tags;
    }

    function getTagLabel(tag) {
      if (tag === "hyperfertility") return "Hyperfertility & sexual deviance";
      if (tag === "pain") return "Pain insensitivity";
      if (tag === "inferiority") return "Biological differences & inferiority";
      if (tag === "utility") return "Biological utility";
      return null;
    }

    function classifySlides() {
      const slides = document.querySelectorAll(".tl-slide");

      slides.forEach((slide) => {
        slide.classList.remove(
          "tag-hyperfertility",
          "tag-pain",
          "tag-inferiority",
          "tag-utility",
          "alt-dark",
          "alt-light",
          "is-hidden-by-filter"
        );

        const groupEl = slide.querySelector(".tl-slide-group");
        const groupText = groupEl ? groupEl.textContent : "";
        const combinedText = groupText + " " + (slide.textContent || "");
        const tags = getTagsFromText(combinedText);

        tags.forEach(tag => {
          slide.classList.add(`tag-${tag}`);
        });
      });

      const regularSlides = Array.from(slides).filter(slide => {
        return !slide.classList.contains("tl-title-slide");
      });

      regularSlides.forEach((slide, index) => {
        if (index % 2 === 0) {
          slide.classList.add("alt-dark");
        } else {
          slide.classList.add("alt-light");
        }
      });
    }

    function classifyMarkers() {
      const markers = document.querySelectorAll(".tl-timemarker");

      markers.forEach((marker) => {
        marker.classList.remove(
          "tag-hyperfertility",
          "tag-pain",
          "tag-inferiority",
          "tag-utility",
          "is-hidden-by-filter"
        );

        const tags = getTagsFromText(marker.textContent || "");

        tags.forEach(tag => {
          marker.classList.add(`tag-${tag}`);
        });
      });
    }

    function addSlidePills() {
      const slides = document.querySelectorAll(".tl-slide");

      slides.forEach((slide) => {
        const headline = slide.querySelector(".tl-headline");
        if (!headline) return;
        if (slide.classList.contains("tl-title-slide")) return;

        headline.querySelectorAll(".event-pill").forEach(pill => pill.remove());

        const groupEl = slide.querySelector(".tl-slide-group");
        const groupText = groupEl ? groupEl.textContent : "";
        const combinedText = groupText + " " + (slide.textContent || "");
        const tags = getTagsFromText(combinedText);

        tags.forEach(tag => {
          const label = getTagLabel(tag);
          if (!label) return;

          const pill = document.createElement("span");
          pill.className = `event-pill tag-${tag}`;
          pill.textContent = label;
          headline.prepend(pill);
        });
      });
    }

    function applyFilter(tag) {
      currentFilter = tag;

      document.querySelectorAll(".timeline-filter-btn").forEach(btn => {
        btn.classList.toggle("is-active", btn.dataset.filter === tag);
      });

      document.querySelectorAll(".tl-slide").forEach(slide => {
        slide.classList.remove("is-hidden-by-filter");

        if (slide.classList.contains("tl-title-slide")) {
          return;
        }

        if (tag !== "all" && !slide.classList.contains(`tag-${tag}`)) {
          slide.classList.add("is-hidden-by-filter");
        }
      });

      document.querySelectorAll(".tl-timemarker").forEach(marker => {
        marker.classList.remove("is-hidden-by-filter");

        if (tag !== "all" && !marker.classList.contains(`tag-${tag}`)) {
          marker.classList.add("is-hidden-by-filter");
        }
      });
    }

    function enhanceTimeline() {
      classifySlides();
      classifyMarkers();
      addSlidePills();
      applyFilter(currentFilter);
    }

    timeline.on("loaded", () => {
      setTimeout(enhanceTimeline, 250);
    });

    timeline.on("change", () => {
      setTimeout(enhanceTimeline, 250);
    });

    document.querySelectorAll(".timeline-filter-btn").forEach(button => {
      button.addEventListener("click", () => {
        applyFilter(button.dataset.filter);
      });
    });
  </script>
</body>
</html>
