<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Timeline</title>

  <!-- TimelineJS CSS -->
  <link rel="stylesheet" href="https://cdn.knightlab.com/libs/timeline3/latest/css/timeline.css">

  <!-- YOUR custom CSS -->
  <link rel="stylesheet" href="timeline-theme.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    #timeline-embed {
      width: 100%;
      height: 650px;
    }

    /* =========================
       ALTERNATING SLIDES
       ========================= */

    /* DARK */
    .tl-slide.alt-dark {
      background: #2f2f2f !important;
    }

    .tl-slide.alt-dark .tl-text,
    .tl-slide.alt-dark .tl-text-content-container,
    .tl-slide.alt-dark .tl-slide-content-container {
      background: #2f2f2f !important;
      box-shadow: none !important;
    }

    .tl-slide.alt-dark .tl-headline,
    .tl-slide.alt-dark .tl-text-content,
    .tl-slide.alt-dark .tl-text p,
    .tl-slide.alt-dark .tl-headline-date,
    .tl-slide.alt-dark .tl-headline-date h4 {
      color: #ffffff !important;
      text-shadow: none !important;
    }

    /* LIGHT */
    .tl-slide.alt-light {
      background: #ffffff !important;
    }

    .tl-slide.alt-light .tl-text,
    .tl-slide.alt-light .tl-text-content-container,
    .tl-slide.alt-light .tl-slide-content-container {
      background: #ffffff !important;
    }

    .tl-slide.alt-light .tl-headline,
    .tl-slide.alt-light .tl-text-content,
    .tl-slide.alt-light .tl-text p,
    .tl-slide.alt-light .tl-headline-date,
    .tl-slide.alt-light .tl-headline-date h4 {
      color: #000000 !important;
      text-shadow: none !important;
    }
  </style>
</head>

<body>

  <div id="timeline-embed"></div>

  <!-- TimelineJS script -->
  <script src="https://cdn.knightlab.com/libs/timeline3/latest/js/timeline.js"></script>

  <script>
    const source = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSrFsEAi3oN7zJZMshHsqHT7jAk0Nt4iM_uL03vN5KmABk79tknJ-NXnBS1V6WulB_lJwg4b2qmi_FC/pubhtml";

    const timeline = new TL.Timeline("timeline-embed", source, {
      initial_zoom: 2
    });

    /* =========================
       ALTERNATING LOGIC
       ========================= */

    function alternateSlides() {
      const slides = document.querySelectorAll(".tl-slide");

      slides.forEach((slide, index) => {
        slide.classList.remove("alt-dark", "alt-light");

        if (index % 2 === 0) {
          slide.classList.add("alt-dark");   // first = dark
        } else {
          slide.classList.add("alt-light");  // next = light
        }
      });
    }

    /* run when timeline loads */
    timeline.on("loaded", () => {
      alternateSlides();
    });

    /* run when navigating */
    timeline.on("change", () => {
      setTimeout(alternateSlides, 100);
    });

    /* backup observer (TimelineJS rerenders a lot) */
    const observer = new MutationObserver(() => {
      alternateSlides();
    });

    observer.observe(document.body, {
      childList: true,
      subtree: true
    });
  </script>

</body>
</html>
